<!doctype html>
<html>
  <head>
    <title>Badminton Catalog</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Snap My Badminton</h1>
    </header>

    <div class="filters">
      <!-- lets work on filters "price, brands, difference between racket and shuttle" -->
      this will be where you can filter the cards by different categories, but for now it just looks pretty (pretty is subjective)
      <input type="number" placeholder="price min">
      <input type="number" placeholder="price max">

      <input type="checkbox" id="racket-filter" name="category" value="racket"> Racket
      <input type="checkbox" id="shuttle-filter" name="category" value="shuttle"> Shuttlecock
      <input type="checkbox" id="shoe-filter" name="category" value="Shoe"> Shoe
      
    </div>

    <div id="card-container"></div>
    <div class="card" style="display: none">

      <div class="card-content">
        <h2>TV Show Title</h2>

        <img src="" alt="TV Show Poster" />

        <ul>
          <li id="price">Bullet Point 1</li>
          <li>Bullet Point 2</li>
          <li>Bullet Point 3</li>
        </ul>
      </div>

    </div>

    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
