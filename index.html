<!doctype html>
<html>
  <head>
    <title>Badminton Catalog</title>
    <meta name="description" content="A Catalog of badminton equipment" />
    <link rel="stylesheet" href="style.css" />
    <!-- <script type="text/javascript" src="scripts.js"></script> -->
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Snap My Badminton</h1>
    </header>

    <div class="toolbar">
      <!-- Search bar -->
      <input type="text" id="search" placeholder="Search by name or brand">
      <button type="button" id="search-filter">Filter</button>

      <!-- Item Filters -->
      <div class="category-filters" id="cat-filters">
        <button class="category-button active" data-cat="all">All</button>
        <button class="category-button" data-cat="Racket">Rackets</button>
        <button class="category-button" data-cat="Birdies">Birdies</button>
        <button class="category-button" data-cat="Shoes">Shoes</button>
        <button class="category-button" data-cat="Bag">Bag</button>
        <button class="category-button" data-cat="Strings">Strings</button>
      </div>

      <!-- price ranges -->
      <div class="price-inputs">
        <input type="number" id="min" placeholder="$ min"> -
        <input type="number" id="max" placeholder="$ max">
        <button type="button" id="budget-filter">Filter</button>
      </div>

    </div>

    <div id="card-container"></div>
    <div class="card" style="display: none">

      <div class="card-content">
        <h2>Rackets</h2>

        <img src="" alt="TV Show Poster" />

        <ul>
          <li id="price">Bullet Point 1</li>
          <select class="playerSelect">
            <option value="">Select a player</option>
          </select>
          <button id="addItem"> Add to inventory </button>
        </ul>
      </div>

    </div>


    <!-- player selects! -->
    <div class="players-section">
      <h2 class="players-title">Badminton Players</h2>
      <div id="player-container">
        <div class="player-card" style="display: none;">
          <div class="player-content">
            <h3 class="player-name">Player Name</h3>
            <p class="player-age">Age: 0</p>
            <p class="player-skill">Skill: beginner</p>
            <p class="player-birdies">Birdies: 0</p>
            <p class="player-inventory">Inventory: none</p>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
    </div>
  </body>

  <!-- moving script to the bottom - something i learned from my SWE bootcamp -->
  <script type="text/javascript" src="scripts.js"></script>

</html>
